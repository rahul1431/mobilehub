name: alpha_hub_mobile
description: A premium trading analytics mobile app for Trade Tips Pro.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  google_fonts: ^6.1.0
  intl: ^0.18.1
  fl_chart: ^0.63.0
  glassmorphism: ^3.0.0
  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Bold.ttf
          weight: 700
