name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./mobile_hub # Adjust this if you push ONLY the mobile folder

      - name: Build APK
        run: flutter build apk --release
        working-directory: ./mobile_hub # Adjust this if you push ONLY the mobile folder

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: mobile_hub/build/app/outputs/flutter-apk/app-release.apk
