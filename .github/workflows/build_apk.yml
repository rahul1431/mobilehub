name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'

      - name: Shield Code (Create Backup)
        run: |
          mkdir -p code_backup
          cp -r lib code_backup/
          cp pubspec.yaml code_backup/

      - name: Generate Full Project Wrappers
        run: flutter create . --platforms android --overwrite --project-name alpha_hub_mobile
      
      - name: Unshield Code (Restore Alpha Hub)
        run: |
          rm -rf lib
          cp -r code_backup/lib lib
          cp code_backup/pubspec.yaml pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
